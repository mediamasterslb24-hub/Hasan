<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Hassan</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function drawHeart(x, y, size, color) {
  ctx.beginPath();
  for (let i = 0; i < Math.PI * 2; i += 0.01) {
    let hx = size * 16 * Math.pow(Math.sin(i), 3);
    let hy = -size * (13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
    ctx.lineTo(x + hx, y + hy);
  }
  ctx.fillStyle = color;
  ctx.shadowColor = "#ff4d4d";   // Glow
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let size = 10 + Math.sin(t) * 2;

  drawHeart(canvas.width/2, canvas.height/2, size, "#ff1a1a");

  // أشعة
  for (let i = 0; i < 360; i += 10) {
    let angle = i * Math.PI / 180;
    let x = canvas.width/2 + Math.cos(angle) * 200;
    let y = canvas.height/2 + Math.sin(angle) * 200;

    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "#ff4d4d";
    ctx.stroke();
  }

  // اسم Hassan بالنص تماماً
  ctx.fillStyle = "white";
  ctx.font = "bold 32px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle"; // أهم تعديل
  ctx.fillText("Hassan", canvas.width/2, canvas.height/2);

  t += 0.05;
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
